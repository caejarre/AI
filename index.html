<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat IA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a28;
    --border: #2a2a40;
    --accent: #7c6fff;
    --accent2: #ff6b9d;
    --text: #e8e8f0;
    --text-dim: #7070a0;
    --user-bg: #1e1a3a;
    --ai-bg: #121220;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,111,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,111,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .logo {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: white;
    flex-shrink: 0;
  }

  .header-info h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .header-info p {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 8px #4ade80;
    margin-left: auto;
    animation: pulse-green 2s infinite;
  }

  @keyframes pulse-green {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .btn-clear {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 12px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-clear:hover { color: var(--accent2); border-color: var(--accent2); }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 12px;
    padding: 40px;
    color: var(--text-dim);
  }

  .empty-logo {
    width: 72px;
    height: 72px;
    border-radius: 22px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin-bottom: 8px;
    box-shadow: 0 0 50px rgba(124,111,255,0.25);
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .empty-state h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 24px;
    color: var(--text);
    background: linear-gradient(135deg, var(--text), var(--text-dim));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .empty-state p {
    font-size: 13px;
    line-height: 1.6;
    max-width: 340px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.25);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    color: #4ade80;
    margin-top: 4px;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 12px;
  }

  .suggestion-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 16px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .suggestion-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,111,255,0.08);
    transform: translateY(-1px);
  }

  .msg {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease;
    max-width: 800px;
    width: 100%;
    align-self: center;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; align-self: flex-end; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
  }

  .msg.user .avatar {
    background: var(--user-bg);
    border: 1px solid rgba(124,111,255,0.3);
  }

  .msg.ai .avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }

  .bubble {
    flex: 1;
    padding: 14px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    line-height: 1.75;
    max-width: calc(100% - 44px);
  }

  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid rgba(124,111,255,0.2);
    border-top-right-radius: 4px;
    color: var(--text);
  }

  .msg.ai .bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .bubble pre {
    background: #0d0d18;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    overflow-x: auto;
    margin: 10px 0;
    font-size: 12px;
  }

  .bubble code {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: rgba(124,111,255,0.1);
    padding: 1px 5px;
    border-radius: 4px;
    color: #a8b8ff;
  }

  .bubble pre code {
    background: none;
    padding: 0;
    color: #a8d8a8;
  }

  .bubble p { margin-bottom: 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
  .bubble li { margin-bottom: 3px; }
  .bubble strong { color: white; font-weight: 600; }
  .bubble em { color: #c8c8e8; font-style: italic; }
  .bubble h1, .bubble h2, .bubble h3 {
    font-family: 'Syne', sans-serif;
    color: white;
    margin: 12px 0 6px;
  }
  .bubble h1 { font-size: 17px; }
  .bubble h2 { font-size: 15px; }
  .bubble h3 { font-size: 13px; }
  .bubble a { color: var(--accent); text-decoration: none; }
  .bubble a:hover { text-decoration: underline; }
  .bubble hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

  .typing-bubble {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 18px;
  }

  .typing-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(-5px); opacity: 1; }
  }

  .error-bubble {
    color: #ff9999;
    background: rgba(255,107,107,0.08) !important;
    border-color: rgba(255,107,107,0.2) !important;
    font-size: 12px;
  }

  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 10px 10px 16px;
    transition: border-color 0.2s;
    max-width: 800px;
    margin: 0 auto;
  }

  .input-row:focus-within { border-color: var(--accent); }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    resize: none;
    max-height: 140px;
    line-height: 1.6;
    padding: 2px 0;
  }

  #user-input::placeholder { color: var(--text-dim); }

  #send-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
  }
  #send-btn:hover { opacity: 0.85; transform: scale(1.05); }
  #send-btn:active { transform: scale(0.97); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .input-hint {
    text-align: center;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 8px;
    opacity: 0.5;
  }

  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    #chat { padding: 14px; gap: 12px; }
    .input-area { padding: 12px 14px 16px; }
    .empty-state h2 { font-size: 20px; }
    .suggestions { gap: 6px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">✦</div>
  <div class="header-info">
    <h1>Chat IA</h1>
    <p>Gemini · 100% gratuito</p>
  </div>
  <div class="status-dot" id="status-dot" title="Online"></div>
  <button class="btn-clear" onclick="clearChat()" title="Limpar conversa">↺ Limpar</button>
</header>

<div id="chat">
  <div class="empty-state" id="empty-state">
    <div class="empty-logo">✦</div>
    <h2>Olá! Como posso ajudar?</h2>
    <p>Chat de IA gratuito. Sem cadastro, sem API key — é só escrever.</p>
    <div class="badge">
      <span>●</span> Gratuito e ilimitado
    </div>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="suggest(this)">Explique inteligência artificial</button>
      <button class="suggestion-btn" onclick="suggest(this)">Escreva um poema sobre o mar</button>
      <button class="suggestion-btn" onclick="suggest(this)">Me dê receitas fáceis para o jantar</button>
      <button class="suggestion-btn" onclick="suggest(this)">Crie um código Python simples</button>
      <button class="suggestion-btn" onclick="suggest(this)">Quais são as melhores dicas de estudo?</button>
      <button class="suggestion-btn" onclick="suggest(this)">Traduza "Hello World" para 10 idiomas</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="user-input" placeholder="Escreva sua mensagem..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <p class="input-hint">Enter para enviar · Shift+Enter para nova linha</p>
</div>

<script>
  // ─── CONFIGURAÇÃO ─────────────────────────────────────────────────────────
  // API Key do Gemini embutida (gratuita, tier free do Google)
  // Para trocar: https://aistudio.google.com/app/apikey
  const GEMINI_KEY = 'AIzaSyD1XNDxXXXXXXXXXXXXXXXXXXXXXXXXXX'; // ← COLOQUE SUA CHAVE AQUI
  const MODEL = 'gemini-2.0-flash';
  const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${GEMINI_KEY}`;

  const SYSTEM = `Você é um assistente de IA amigável e prestativo chamado "Chat IA".
Responda sempre em português brasileiro, de forma clara, direta e útil.
Use markdown para formatar respostas quando isso ajudar a clareza (listas, código, negrito, etc).
Seja conciso mas completo. Nunca mencione que você é o Gemini ou Google.`;
  // ─────────────────────────────────────────────────────────────────────────

  let history = [];
  let isLoading = false;

  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('user-input').focus();
  });

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function suggest(btn) {
    document.getElementById('user-input').value = btn.textContent;
    sendMessage();
  }

  function clearChat() {
    history = [];
    const chat = document.getElementById('chat');
    chat.innerHTML = `
      <div class="empty-state" id="empty-state">
        <div class="empty-logo">✦</div>
        <h2>Olá! Como posso ajudar?</h2>
        <p>Chat de IA gratuito. Sem cadastro, sem API key — é só escrever.</p>
        <div class="badge"><span>●</span> Gratuito e ilimitado</div>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="suggest(this)">Explique inteligência artificial</button>
          <button class="suggestion-btn" onclick="suggest(this)">Escreva um poema sobre o mar</button>
          <button class="suggestion-btn" onclick="suggest(this)">Me dê receitas fáceis para o jantar</button>
          <button class="suggestion-btn" onclick="suggest(this)">Crie um código Python simples</button>
          <button class="suggestion-btn" onclick="suggest(this)">Quais são as melhores dicas de estudo?</button>
          <button class="suggestion-btn" onclick="suggest(this)">Traduza "Hello World" para 10 idiomas</button>
        </div>
      </div>`;
  }

  function renderMarkdown(text) {
    let html = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    // Blocos de código
    html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${code.trim()}</code></pre>`
    );
    // Código inline
    html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');
    // Negrito e itálico
    html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Headers
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    // HR
    html = html.replace(/^---$/gm, '<hr>');
    // Listas não ordenadas
    html = html.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>[\s\S]+?<\/li>)(?!\s*<li>)/g, '<ul>$1</ul>');
    // Listas ordenadas
    html = html.replace(/^\d+\. (.+)$/gm, '<oli>$1</oli>');
    html = html.replace(/(<oli>[\s\S]+?<\/oli>)/g, (m) =>
      '<ol>' + m.replace(/<oli>/g,'<li>').replace(/<\/oli>/g,'</li>') + '</ol>'
    );
    // Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
    // Parágrafos
    const parts = html.split(/\n\n+/);
    html = parts.map(p => {
      p = p.trim();
      if (!p) return '';
      if (p.startsWith('<h') || p.startsWith('<ul') || p.startsWith('<ol') || p.startsWith('<pre') || p.startsWith('<hr')) return p;
      return `<p>${p.replace(/\n/g, '<br>')}</p>`;
    }).join('');

    return html;
  }

  function addMessage(role, content, isError = false) {
    const chat = document.getElementById('chat');
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '✦';

    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (isError ? ' error-bubble' : '');

    if (role === 'ai' && !isError) {
      bubble.innerHTML = renderMarkdown(content);
    } else {
      bubble.textContent = content;
    }

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
  }

  function addTyping() {
    const chat = document.getElementById('chat');
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const msg = document.createElement('div');
    msg.className = 'msg ai';
    msg.id = 'typing-msg';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '✦';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing-bubble';
    bubble.innerHTML = `
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>`;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-msg');
    if (t) t.remove();
  }

  async function sendMessage() {
    if (isLoading) return;

    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;

    addMessage('user', text);
    history.push({ role: 'user', parts: [{ text }] });

    input.value = '';
    input.style.height = 'auto';
    addTyping();
    isLoading = true;
    document.getElementById('send-btn').disabled = true;

    try {
      const body = {
        system_instruction: { parts: [{ text: SYSTEM }] },
        contents: history,
        generationConfig: {
          temperature: 0.9,
          maxOutputTokens: 2048,
        }
      };

      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        const msg = err?.error?.message || `Erro ${res.status}`;
        addMessage('ai', `❌ Erro: ${msg}`, true);
        history.pop();
        return;
      }

      const data = await res.json();
      const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text;

      if (!reply) {
        addMessage('ai', '⚠ Sem resposta. Tente novamente.', true);
        history.pop();
        return;
      }

      history.push({ role: 'model', parts: [{ text: reply }] });
      addMessage('ai', reply);

    } catch (err) {
      removeTyping();
      addMessage('ai', `❌ Erro de conexão: ${err.message}`, true);
      history.pop();
    } finally {
      isLoading = false;
      document.getElementById('send-btn').disabled = false;
      input.focus();
    }
  }
</script>
</body>
</html>
document.getElementById('msg').focus();
</script>
</body>
</html>
